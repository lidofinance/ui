name: Publish Alpha

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: publish-alpha
  cancel-in-progress: false

jobs:
  # Gate the whole alpha publish before the dry-run: a prerelease branch must
  # have main merged in, or semantic-release (which only sees tags merged into
  # the branch) computes a version below the latest stable. gh api needs no
  # checkout and works on private repos via GITHUB_TOKEN.
  guard:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure develop is not behind main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          behind=$(gh api "repos/${{ github.repository }}/compare/develop...main" --jq '.ahead_by')
          # Fail closed: a non-numeric result (API error / unexpected body) must
          # block the publish, not silently pass the guard.
          if ! [[ "$behind" =~ ^[0-9]+$ ]]; then
            echo "::error::could not compare develop vs main (got: '$behind')"
            exit 1
          fi
          if [ "$behind" -gt 0 ]; then
            echo "::error::develop is behind main by $behind commit(s) — merge main into develop before an alpha release"
            exit 1
          fi

  dry-run:
    needs: guard
    uses: ./.github/workflows/_dry-run.yml
    permissions:
      contents: write
    secrets: inherit

  publish:
    needs: dry-run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    env:
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc

      - name: Cache node_modules and turbo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-cache-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cache-${{ hashFiles('**/yarn.lock') }}-
            ${{ runner.os }}-cache-

      - run: yarn install --immutable

      - run: yarn build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          echo "provenance=true" >> ~/.npmrc
          yarn release
