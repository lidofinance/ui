name: Deploy Storybook

on:
  push:
    branches:
      - monorepo
  workflow_dispatch:

concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build all Storybooks
        run: yarn turbo run build-storybook
        env:
          PUBLIC_PATH_UI: /lido-ui/lido-ui/
          PUBLIC_PATH_LANDING: /lido-ui/lido-landing/
          PUBLIC_PATH_WIDGET: /lido-ui/lido-widget/

      - name: Assemble gh-pages directory
        run: |
          mkdir -p gh-pages/lido-ui gh-pages/lido-landing gh-pages/lido-widget
          cp -r packages/lido-ui/storybook-static/. gh-pages/lido-ui/
          cp -r packages/lido-landing/storybook-static/. gh-pages/lido-landing/
          cp -r packages/lido-widget/storybook-static/. gh-pages/lido-widget/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
